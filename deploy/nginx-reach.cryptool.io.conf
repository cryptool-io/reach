# Reach — nginx reverse proxy for reach.cryptool.io -> PM2 "reach" (127.0.0.1:3400)
#
# Install on ronserver2:
#   sudo cp deploy/nginx-reach.cryptool.io.conf /etc/nginx/sites-available/reach.cryptool.io
#   sudo ln -s /etc/nginx/sites-available/reach.cryptool.io /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d reach.cryptool.io   # adds the :443 block + http->https redirect
#
# Open/click tracking (/t/o, /t/c) and the login gate are all enforced by the app itself,
# so everything just proxies straight through.

server {
    listen 80;
    listen [::]:80;
    server_name reach.cryptool.io;

    # Tracking pixels/links + CSV import need a little headroom.
    client_max_body_size 25m;

    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $host;

    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;   # AI/agent actions can take a while
    }
}
